# content-relevance.yaml — CGA 老年評估內容關聯（單一源）
#
# 軸：二層域（top.sub）× CFS 等級（cfs1–cfs9）。
#
# inapplicable: key = "top.sub"（合法二層域），value = 不適用的 CFS 等級陣列。
#   邏輯與各量表 src/data/scales/*.yaml 的 applicableCfs 一致：
#   inapplicable = cfs1–cfs9 扣除該量表的 applicableCfs。
#   （applicableCfs 涵蓋全部 cfs 的子項則不列入此表 — 全 CFS 皆適用。）
#
# triggers: 每筆 cga.domain.<top>.<sub>.anomaly.<cfs> 的內容關聯。
#   只對「適用」的格子掛文章（severities=[monitor, refer]）；不適用格由 inapplicable 段表達。
#   videoIds 先留空，影片 curate 於 Phase 2-C / Phase 4 補。
#
# clinicalAlertEducation: CDSS 臨床警示 indicator→slug 對應（純問卷版為空）。


