# content-relevance.yaml — CGA 老年評估內容關聯（單一源）
#
# 軸：二層域（top.sub）× CFS 等級（cfs1–cfs9）。
#
# inapplicable: key = "top.sub"（合法二層域），value = 不適用的 CFS 等級陣列。
#   邏輯與各量表 src/data/scales/*.yaml 的 applicableCfs 一致：
#   inapplicable = cfs1–cfs9 扣除該量表的 applicableCfs。
#   （applicableCfs 涵蓋全部 cfs 的子項則不列入此表 — 全 CFS 皆適用。）
#
# triggers: 每筆 cga.domain.<top>.<sub>.anomaly.<cfs> 的內容關聯。
#   只對「適用」的格子掛文章（severities=[monitor, refer]）；不適用格由 inapplicable 段表達。
#   videoIds 先留空，影片 curate 於 Phase 2-C / Phase 4 補。
#
# clinicalAlertEducation: CDSS 臨床警示 indicator→slug 對應（純問卷版為空）。

inapplicable:
  "physical.comorbidity": [cfs1]
  "physical.polypharmacy": [cfs1]
  "physical.continence": [cfs1, cfs2]
  "psychological.cognition": [cfs9]
  "psychological.mood": [cfs8, cfs9]
  "psychological.delirium": [cfs1, cfs2, cfs3]
  "functional.adl": [cfs1, cfs2]
  "functional.iadl": [cfs1, cfs2]
  "functional.mobility": [cfs1, cfs8, cfs9]
  "functional.falls": [cfs1, cfs9]
  "social.social_support": [cfs1]
  "social.caregiver": [cfs1, cfs2, cfs3]
  "social.financial": [cfs1, cfs2]
  "environmental.home_safety": [cfs1, cfs2, cfs9]
  "environmental.accessibility": [cfs1, cfs2, cfs3]
  "future_wishes.advance_care_planning": [cfs1, cfs2, cfs3, cfs4]
  "future_wishes.treatment_preferences": [cfs1, cfs2, cfs3, cfs4]

triggers:
