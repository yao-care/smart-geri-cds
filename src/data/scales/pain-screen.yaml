# 疼痛短篩 — Pain screen（NRS 0–10 數字評分／臉譜量表）
# 來源：Numeric Rating Scale（NRS）／Faces Pain Scale 之公開疼痛自評概念。
# 受測者就「過去一週最痛的程度」以 0（無痛）至 10（最痛）作答（或以臉譜對應）。
# clinicallyReviewed: false → 題目、適用 CFS、切分點待臨床最終簽核。
#
# 角色（2026-05 起，C-S1）：physical.pain 領域之 Tier-1 短篩（tier: screen）。
#   一般受測者以 NRS/臉譜自述（ask-patient）；當受測者因認知障礙無法可靠自述時，
#   亮燈後展開 PAINAD 觀察型量表（expandsTo: painad，mode observe）。
# 計分：NRS 分級 0 無痛／1–3 輕度／4–10 中重度。maxScore=10。
id: pain-screen
domain:
  top: physical
  sub: pain
tier: screen
expandsTo: painad
applicableCfs: [cfs1, cfs2, cfs3, cfs4, cfs5, cfs6, cfs7, cfs8, cfs9]
scoring: sum
inputType: option
maxScore: 10
items:
  - id: pain_nrs
    mode: ask-patient
    prompt: 請受測者就「過去一週最痛的程度」以 0（完全不痛）到 10（能想像的最痛）作答；若不易理解數字，可改用臉譜量表對應。認知障礙無法可靠自述者改用 PAINAD 觀察。
    text: 過去一週疼痛程度（0–10）
    options:
      - { label: "0 完全不痛", score: 0 }
      - { label: "1", score: 1 }
      - { label: "2", score: 2 }
      - { label: "3 輕度疼痛", score: 3 }
      - { label: "4", score: 4 }
      - { label: "5", score: 5 }
      - { label: "6 中度疼痛", score: 6 }
      - { label: "7", score: 7 }
      - { label: "8", score: 8 }
      - { label: "9", score: 9 }
      - { label: "10 最劇烈疼痛", score: 10 }
bands:
  - { min: 0, max: 0, severity: normal, label: 無疼痛 }
  - { min: 1, max: 3, severity: monitor, label: 輕度疼痛，建議追蹤與處置 }
  - { min: 4, max: 10, severity: refer, label: 中重度疼痛，建議轉介疼痛評估與處置 }
clinicallyReviewed: false
