# 4AT — Rapid Clinical Test for Delirium (MacLullich et al., www.the4at.com)
# 來源：公開標準量表（免費臨床使用）。4 項：警醒度(0/4)、AMT4(0–2)、
# 注意力-倒數月份(0–2)、急性變化或病程波動(0/4)，總分 0–12。
# ≥4 提示可能譫妄；1–3 提示認知障礙；0 為正常。中文題目為暫譯；
# clinicallyReviewed: true（已臨床簽核）。
#
# C-M1 譫妄不可靠短篩守門：delirium 領域不設 informant 守門短篩，
#   4AT 直接施測（tier: screen，always-run），警醒度 observe 近零負擔。
#   低活躍型、無家屬時靠 1 題會假陰性漏掉敗血/藥物中毒等急症。
# C-M3 措辭：AMT4 列出 4 子題（年齡/出生年月日/地點/年份），地點接受
#   醫院/建築/城市任一正確即算對；移除舊的 meta 摘要句。
# C-M6 效度閘門：AMT4/注意力屬需病人本人作答之認知測驗 → requiresPatient: true，
#   家屬代答時引擎標記效度存疑。
# 報告層提示：4AT 陽性 + 急性起伏 → 先疑譫妄、找可逆病因，非逕歸失智。
id: 4at
domain:
  top: psychological
  sub: delirium
tier: screen
alwaysRun: true
applicableCfs: [cfs4, cfs5, cfs6, cfs7, cfs8, cfs9]
scoring: sum
inputType: option
requiresPatient: true
maxScore: 12
items:
  - id: at4_alertness
    mode: observe
    prompt: 請觀察受測者於互動中的警醒程度（是否明顯嗜睡、難以喚醒，或過度警醒躁動）。
    options:
      - { label: 正常（清醒且穩定）, score: 0 }
      - { label: 輕度嗜睡 < 10 秒後恢復, score: 0 }
      - { label: 明顯異常（嗜睡或躁動）, score: 4 }
  - id: at4_amt4
    mode: patient
    prompt: 請依序詢問下列 4 題並記錄答錯題數。地點題只要回答醫院、建築物名稱或所在城市任一正確即算對。
    subquestions:
      - 您今年幾歲？
      - 您的出生年月日？
      - 這裡是什麼地方？
      - 今年是哪一年？
    options:
      - { label: 全部答對（0 題錯）, score: 0 }
      - { label: 答錯 1 題, score: 1 }
      - { label: 答錯 2 題以上, score: 2 }
  - id: at4_attention
    mode: patient
    prompt: 請受測者從 12 月開始，倒著唸出一年的月份（12、11、10…）。
    options:
      - { label: 正確唸到 7 個月以上, score: 0 }
      - { label: 唸出但 < 7 個月或有錯, score: 1 }
      - { label: 無法開始（因不適、嗜睡或不專注）, score: 2 }
  - id: at4_acute
    mode: ask-informant
    prompt: 請詢問家屬/照顧者或查閱病歷：過去兩週內出現、且過去 24 小時仍存在的意識、認知或行為之急性變化或波動？
    options:
      - { label: 否, score: 0 }
      - { label: 是, score: 4 }
bands:
  - { min: 0, max: 0, severity: normal, label: 無譫妄或認知障礙徵兆 }
  - { min: 1, max: 3, severity: monitor, label: 疑似認知障礙，建議追蹤評估 }
  - { min: 4, max: 12, severity: refer, label: 可能譫妄（合併或不合併認知障礙）；先疑可逆病因，建議轉介 }
clinicallyReviewed: true
