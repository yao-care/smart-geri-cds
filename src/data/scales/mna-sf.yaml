# MNA-SF — Mini Nutritional Assessment Short Form（Nestlé/Rubenstein 2001）
# 來源：公開標準量表（簡版營養評估），6 項，總分 0–14，分數越高營養越佳
# （higher = better）。12–14 營養正常／8–11 有營養不良風險／0–7 營養不良。
# 中文題目為暫譯；clinicallyReviewed: true（已臨床簽核）。
#
# 角色（2026-05 起）：nutrition 領域之 Tier-2 深評（tier: full），由 nutrition 短篩亮燈後展開。
# C-S3 切分點微調：F 項無法量測 BMI 時改用小腿圍（CC < 31cm）替代題，
#   CC < 31cm 計 0、CC ≥ 31cm 計 3（與 BMI 版同分以維持 maxScore=14）。
# C-S4 mode：行動能力（mna_mobility）與神經精神（mna_neuro）改 observe（操作者觀察/病歷判定），
#   其餘項向受測者或家屬詢問；BMI/CC 為量測（measure）。
id: mna-sf
domain:
  top: physical
  sub: nutrition
tier: full
applicableCfs: [cfs1, cfs2, cfs3, cfs4, cfs5, cfs6, cfs7, cfs8, cfs9]
scoring: sum
inputType: option
maxScore: 14
items:
  - id: mna_intake
    text: 過去三個月內，是否因食慾不振、消化問題、咀嚼或吞嚥困難而減少進食量？
    mode: ask-either
    prompt: 請向受測者或家屬詢問過去三個月的進食量變化。
    options:
      - { label: 嚴重食慾不振（食量大幅減少）, score: 0 }
      - { label: 中度食慾不振（食量減少）, score: 1 }
      - { label: 食慾正常（食量無減少）, score: 2 }
  - id: mna_weightloss
    text: 過去三個月內的體重變化？
    mode: ask-either
    prompt: 請向受測者或家屬詢問（或查閱）過去三個月的體重變化。
    options:
      - { label: 體重減輕超過 3 公斤, score: 0 }
      - { label: 不清楚, score: 1 }
      - { label: 體重減輕 1–3 公斤, score: 2 }
      - { label: 體重無減輕, score: 3 }
  - id: mna_mobility
    text: 行動能力？
    mode: observe
    prompt: 請操作者觀察或依病歷判定受測者的行動能力。
    options:
      - { label: 臥床或長期坐輪椅, score: 0 }
      - { label: 可下床或離開輪椅但無法外出, score: 1 }
      - { label: 可自由外出活動, score: 2 }
  - id: mna_stress
    text: 過去三個月內是否曾有急性疾病或重大心理壓力？
    mode: ask-either
    prompt: 請向受測者或家屬詢問（或查閱病歷）過去三個月是否有急性疾病或重大心理壓力。
    options:
      - { label: 是, score: 0 }
      - { label: 否, score: 2 }
  - id: mna_neuro
    text: 是否有神經精神方面的問題？
    mode: observe
    prompt: 請操作者依觀察或病歷判定受測者是否有神經精神問題（失智/憂鬱）。
    options:
      - { label: 嚴重失智或憂鬱, score: 0 }
      - { label: 輕度失智, score: 1 }
      - { label: 無神經精神問題, score: 2 }
  - id: mna_bmi
    text: 身體質量指數（BMI），或無法量測時改用小腿圍（CC）
    mode: measure
    prompt: 請量測 BMI（= 體重kg ÷ 身高m²）並選擇對應分級；若無法量測身高/體重，改量小腿圍（CC），選擇 CC 對應選項（CC < 31cm 或 CC ≥ 31cm）。兩種途徑擇一作答即可。
    options:
      - { label: BMI < 19, score: 0 }
      - { label: BMI 19 至 < 21, score: 1 }
      - { label: BMI 21 至 < 23, score: 2 }
      - { label: BMI ≥ 23, score: 3 }
      - { label: 小腿圍 CC < 31 cm（無法測 BMI 時替代）, score: 0 }
      - { label: 小腿圍 CC ≥ 31 cm（無法測 BMI 時替代）, score: 3 }
bands:
  - { min: 0, max: 7, severity: refer, label: 營養不良，建議轉介營養評估與介入 }
  - { min: 8, max: 11, severity: monitor, label: 有營養不良風險，建議追蹤 }
  - { min: 12, max: 14, severity: normal, label: 營養狀況正常 }
clinicallyReviewed: true
