# 大方向 triage 題（tier: triage）。取材 social-support-screen 代表題（社會孤立）。
# concern → 展開 social-support-screen 短篩（screen），其再亮燈展開 LSNS-6 深評。
# clinicallyReviewed: false → 待臨床簽核。
id: social-support-triage
domain:
  top: social
  sub: social_support
tier: triage
expandsTo: social-support-screen
applicableCfs: [cfs2, cfs3, cfs4, cfs5, cfs6, cfs7, cfs8, cfs9]
scoring: sum
inputType: option
maxScore: 1
items:
  - id: soc_triage_q
    mode: ask-either
    prompt: 請向受測者或家屬詢問：是否覺得孤立，或缺少可求助的家人／朋友？
    text: 是否覺得孤立，或缺少可求助的家人/朋友？
    options:
      - { label: 否, score: 0 }
      - { label: 是, score: 1 }
bands:
  - { min: 0, max: 0, severity: normal, label: 無社會孤立徵兆 }
  - { min: 1, max: 1, severity: monitor, label: 有孤立感或支持不足，建議進一步社會支持短篩 }
clinicallyReviewed: false
