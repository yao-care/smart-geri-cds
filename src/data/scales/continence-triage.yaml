# 大方向 triage 題（tier: triage）。取材 continence-screen 代表題（非自主漏尿）。
# concern → 展開 continence-screen 短篩（screen）。
# clinicallyReviewed: true（已臨床簽核）。
id: continence-triage
domain:
  top: physical
  sub: continence
tier: triage
expandsTo: continence-screen
applicableCfs: [cfs3, cfs4, cfs5, cfs6, cfs7, cfs8, cfs9]
scoring: sum
inputType: option
maxScore: 1
items:
  - id: cont_triage_q
    mode: ask-either
    prompt: 請向受測者或家屬詢問：是否曾有非自主漏尿或排尿困擾？
    text: 是否曾有非自主漏尿或排尿困擾？
    options:
      - { label: 否, score: 0 }
      - { label: 是, score: 1 }
bands:
  - { min: 0, max: 0, severity: normal, label: 無失禁困擾徵兆 }
  - { min: 1, max: 1, severity: monitor, label: 有漏尿/排尿困擾，建議進一步失禁短篩 }
clinicallyReviewed: true
