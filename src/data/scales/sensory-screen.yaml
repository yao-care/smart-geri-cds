# 視/聽感官自述短篩 — Vision & hearing self-report screen
# 來源：自述題組（非標準命名量表），以實證合理題目組成（沿用如 "您是否
# 有聽力困難" 之單題篩檢概念），辨識視覺與聽覺障礙。每項 0–2，2 題總分 0–4。
# 無困難 normal／單項困難 monitor／雙項或重度 refer。
# clinicallyReviewed: false → 題目、適用 CFS、切分點待臨床最終簽核。
id: sensory-screen
domain:
  top: physical
  sub: sensory
tier: screen
applicableCfs: [cfs1, cfs2, cfs3, cfs4, cfs5, cfs6, cfs7, cfs8, cfs9]
scoring: sum
inputType: option
maxScore: 4
items:
  - id: sens_vision
    text: 即使戴上眼鏡，您是否在看電視、閱讀或辨識他人時感到視力困難？
    mode: ask-patient
    prompt: 請唸給受測者並記錄回答：即使戴上眼鏡，看電視、閱讀或辨識他人時是否感到視力困難？
    options:
      - { label: 沒有困難, score: 0 }
      - { label: 有些困難, score: 1 }
      - { label: 嚴重困難或看不清楚, score: 2 }
  - id: sens_hearing
    text: 即使戴上助聽器，您是否在安靜環境中與他人交談時感到聽力困難？
    mode: ask-patient
    prompt: 請唸給受測者並記錄回答：即使戴上助聽器，安靜環境中與他人交談時是否感到聽力困難？
    options:
      - { label: 沒有困難, score: 0 }
      - { label: 有些困難, score: 1 }
      - { label: 嚴重困難或聽不清楚, score: 2 }
bands:
  - { min: 0, max: 0, severity: normal, label: 視聽功能無明顯困難 }
  - { min: 1, max: 2, severity: monitor, label: 單項感官輕度困難，建議追蹤或檢查 }
  - { min: 3, max: 4, severity: refer, label: 雙項或重度感官障礙，建議轉介眼科/耳鼻喉科 }
clinicallyReviewed: false
