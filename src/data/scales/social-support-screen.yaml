# 社會支持短篩 — Social support / isolation screen
# 來源：自述之單題短篩（非標準命名量表，取 LSNS 之社會接觸精神），
# 初步辨識社會孤立風險。clinicallyReviewed: true（已臨床簽核）。
#
# 角色（2026-05 起）：social_support 領域之 Tier-1 短篩（tier: screen）。亮燈後展開 LSNS-6 深評。
id: social-support-screen
domain:
  top: social
  sub: social_support
tier: screen
expandsTo: lsns-6
applicableCfs: [cfs2, cfs3, cfs4, cfs5, cfs6, cfs7, cfs8, cfs9]
scoring: sum
inputType: option
maxScore: 2
items:
  - id: soc_contact
    mode: ask-either
    prompt: 請向受測者或家屬詢問：過去一週與家人或朋友見面、通電話或聯絡的頻率如何？
    text: 過去一週與家人/朋友的社會接觸頻率
    options:
      - { label: 經常（每週數次以上）, score: 0 }
      - { label: 偶爾（每週約一次）, score: 1 }
      - { label: 很少或幾乎沒有, score: 2 }
bands:
  - { min: 0, max: 0, severity: normal, label: 社會連結良好 }
  - { min: 1, max: 1, severity: monitor, label: 社會接觸偏少，建議追蹤與鼓勵社會參與 }
  - { min: 2, max: 2, severity: refer, label: 社會孤立風險高，建議轉介社會支持資源 }
clinicallyReviewed: true
