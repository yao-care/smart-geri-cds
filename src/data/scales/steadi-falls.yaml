# STEADI 跌倒風險關鍵問題 — CDC STEADI "Stay Independent" key questions
# 來源：美國 CDC STEADI 公開工具的三大關鍵篩檢問題（過去一年是否跌倒、
# 是否感到站立或行走不穩、是否擔心跌倒）。任一陽性即提示跌倒風險，
# 三題皆為跌倒風險判定核心，任一陽性即建議進一步評估。
# 每題是=1/否=0，3 題總分 0–3。clinicallyReviewed: false → 題目、適用 CFS、
# 切分點待臨床最終簽核，尚不可用於正式臨床決策。
id: steadi-falls
domain:
  top: functional
  sub: falls
applicableCfs: [cfs2, cfs3, cfs4, cfs5, cfs6, cfs7, cfs8]
scoring: sum
inputType: option
maxScore: 3
items:
  - id: steadi_fell
    text: 過去一年內，您是否曾經跌倒？
    options:
      - { label: 否, score: 0 }
      - { label: 是, score: 1 }
  - id: steadi_unsteady
    text: 您站立或行走時是否感到不穩？
    options:
      - { label: 否, score: 0 }
      - { label: 是, score: 1 }
  - id: steadi_worry
    text: 您是否擔心自己會跌倒？
    options:
      - { label: 否, score: 0 }
      - { label: 是, score: 1 }
bands:
  - { min: 0, max: 0, severity: normal, label: 無明顯跌倒風險徵兆 }
  - { min: 1, max: 1, severity: monitor, label: 具跌倒風險因子，建議追蹤與居家檢視 }
  - { min: 2, max: 3, severity: refer, label: 高跌倒風險，建議轉介步態平衡評估 }
clinicallyReviewed: true
