# 多重用藥風險短篩 — Polypharmacy & high-risk medication screen
# 來源：自述/家屬核對題組（非標準命名量表），以實證合理題目組成。用藥顆數分級
# （<5 / 5–9 / ≥10 種）加計高風險藥物（Beers Criteria 旗標）。
# clinicallyReviewed: true（已臨床簽核）。
#
# 角色（2026-05 起）：polypharmacy 領域之 Tier-1 短篩（tier: screen，無另設深評）。
# C-S5 高風險藥自評效度低：高風險藥題改 mode ask-informant（問家屬/核對病歷），
#   並降權（由原本 4 降為 1），使單一高風險藥題不再單獨即推至 refer——
#   高風險藥僅 monitor，須合併實際用藥種數才升至 refer。
#   計分：種數 <5=0 / 5–9=2 / ≥10=4；高風險藥 是=1。maxScore=5。
#     - 0 → normal
#     - 1–3 → monitor（含「僅高風險藥」或「5–9 種」）
#     - 4–5 → refer（≥10 種，或 ≥10 種合併高風險藥）
id: polypharmacy
domain:
  top: physical
  sub: polypharmacy
tier: screen
applicableCfs: [cfs2, cfs3, cfs4, cfs5, cfs6, cfs7, cfs8, cfs9]
scoring: sum
inputType: option
maxScore: 5
items:
  - id: poly_count
    mode: ask-either
    prompt: 請向受測者或家屬詢問（可請其數藥盒）：目前每天規律服用的處方藥物共有幾種？
    text: 您目前每天規律服用的處方藥物共有幾種？
    options:
      - { label: 少於 5 種, score: 0 }
      - { label: 5 至 9 種, score: 2 }
      - { label: 10 種以上, score: 4 }
  - id: poly_highrisk
    mode: ask-informant
    prompt: 請向家屬詢問或核對病歷/藥袋：受測者是否服用高風險藥物（如鎮靜安眠藥、抗膽鹼藥、長效降血糖藥等 Beers 清單藥物）？（自評效度低，建議由家屬或病歷核對）
    text: 是否服用高風險藥物（Beers 清單藥物）？
    options:
      - { label: 否或不確定但無上述藥物, score: 0 }
      - { label: 是, score: 1 }
bands:
  - { min: 0, max: 0, severity: normal, label: 無多重用藥疑慮 }
  - { min: 1, max: 3, severity: monitor, label: 多重用藥（5–9 種）或含高風險藥，建議用藥檢視 }
  - { min: 4, max: 5, severity: refer, label: 嚴重多重用藥（≥10 種，或合併高風險藥），建議藥師整合性用藥評估 }
clinicallyReviewed: true
