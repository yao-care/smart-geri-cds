# 大方向 triage 題（tier: triage）。取材 adl-screen 代表題（基本自我照顧協助需求）。
# concern → 展開 adl-screen 短篩（screen），其再亮燈展開 Barthel 深評。
# clinicallyReviewed: false → 待臨床簽核。
id: adl-triage
domain:
  top: functional
  sub: adl
tier: triage
expandsTo: adl-screen
applicableCfs: [cfs3, cfs4, cfs5, cfs6, cfs7, cfs8, cfs9]
scoring: sum
inputType: option
maxScore: 1
items:
  - id: adl_triage_q
    mode: ask-either
    prompt: 請向受測者或家屬詢問：洗澡、穿衣、如廁等基本自我照顧是否需要他人協助？
    text: 洗澡、穿衣、如廁等基本自我照顧是否需要他人協助？
    options:
      - { label: 否（完全獨立）, score: 0 }
      - { label: 是（需要協助）, score: 1 }
bands:
  - { min: 0, max: 0, severity: normal, label: 基本日常活動大致獨立 }
  - { min: 1, max: 1, severity: monitor, label: 有自我照顧協助需求，建議進一步 ADL 短篩 }
clinicallyReviewed: false
