# 大方向 triage 題（tier: triage）。取材 sensory-screen 代表題（視力/聽力困難）。
# concern → 展開 sensory-screen 短篩（screen）。
# clinicallyReviewed: false → 待臨床簽核。
id: sensory-triage
domain:
  top: physical
  sub: sensory
tier: triage
expandsTo: sensory-screen
applicableCfs: [cfs1, cfs2, cfs3, cfs4, cfs5, cfs6, cfs7, cfs8, cfs9]
scoring: sum
inputType: option
maxScore: 1
items:
  - id: sens_triage_q
    mode: ask-either
    prompt: 請向受測者或家屬詢問：視力或聽力是否影響日常生活（如看電視、與人交談）？
    text: 視力或聽力是否影響日常生活？
    options:
      - { label: 否, score: 0 }
      - { label: 是, score: 1 }
bands:
  - { min: 0, max: 0, severity: normal, label: 無視聽困難徵兆 }
  - { min: 1, max: 1, severity: monitor, label: 有視聽困難，建議進一步感官短篩 }
clinicallyReviewed: false
