# 大方向 triage 題（tier: triage）。取材 pain-screen 代表題（疼痛困擾）。
# concern → 展開 pain-screen 短篩（screen），其再亮燈展開 PAINAD 深評。
# clinicallyReviewed: true（已臨床簽核）。
id: pain-triage
domain:
  top: physical
  sub: pain
tier: triage
expandsTo: pain-screen
applicableCfs: [cfs1, cfs2, cfs3, cfs4, cfs5, cfs6, cfs7, cfs8, cfs9]
scoring: sum
inputType: option
maxScore: 1
items:
  - id: pain_triage_q
    mode: ask-either
    prompt: 請向受測者或家屬詢問：最近是否有讓您困擾的疼痛？
    text: 最近是否有讓您困擾的疼痛？
    options:
      - { label: 否, score: 0 }
      - { label: 是, score: 1 }
bands:
  - { min: 0, max: 0, severity: normal, label: 無疼痛困擾徵兆 }
  - { min: 1, max: 1, severity: monitor, label: 有疼痛困擾，建議進一步疼痛短篩 }
clinicallyReviewed: true
