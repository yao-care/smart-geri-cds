# 大方向 triage 題（tier: triage）。取材 mood-screen 代表題（情緒低落/提不起勁）。
# concern → 展開 mood-screen 短篩（screen），其再亮燈展開 GDS-15 深評。
# clinicallyReviewed: true（已臨床簽核）。
id: mood-triage
domain:
  top: psychological
  sub: mood
tier: triage
expandsTo: mood-screen
applicableCfs: [cfs1, cfs2, cfs3, cfs4, cfs5, cfs6, cfs7]
scoring: sum
inputType: option
maxScore: 1
items:
  - id: mood_triage_q
    mode: ask-either
    prompt: 請向受測者詢問：最近兩週是否常感到情緒低落，或做事提不起勁？
    text: 最近兩週是否常感到情緒低落，或做事提不起勁？
    options:
      - { label: 否, score: 0 }
      - { label: 是, score: 1 }
bands:
  - { min: 0, max: 0, severity: normal, label: 無情緒低落徵兆 }
  - { min: 1, max: 1, severity: monitor, label: 有情緒低落/提不起勁，建議進一步憂鬱短篩 }
clinicallyReviewed: true
