# 經濟壓力自述短篩 — Financial strain self-report screen
# 來源：自述題組（非標準命名量表），以實證合理題目組成，辨識經濟壓力與
# 因經濟因素延後就醫/用藥之情形。每題 0–2，2 題總分 0–4。
# clinicallyReviewed: false → 題目、適用 CFS、切分點待臨床最終簽核。
id: financial-screen
domain:
  top: social
  sub: financial
tier: screen
applicableCfs: [cfs3, cfs4, cfs5, cfs6, cfs7, cfs8, cfs9]
scoring: sum
inputType: option
maxScore: 4
items:
  - id: fin_meet
    text: 您目前的收入或積蓄是否足以支應日常生活所需（飲食、居住、水電）？
    mode: ask-patient
    prompt: 請向受測者或家屬詢問目前收入/積蓄是否足以支應日常生活所需。
    options:
      - { label: 足夠, score: 0 }
      - { label: 勉強夠用, score: 1 }
      - { label: 經常不夠用, score: 2 }
  - id: fin_care
    text: 過去一年，您是否曾因經濟因素而延後就醫、減少用藥或無法負擔照護費用？
    mode: ask-patient
    prompt: 請向受測者或家屬詢問過去一年是否曾因經濟因素延後就醫、減藥或無法負擔照護。
    options:
      - { label: 沒有, score: 0 }
      - { label: 偶爾, score: 1 }
      - { label: 經常, score: 2 }
bands:
  - { min: 0, max: 0, severity: normal, label: 無明顯經濟壓力 }
  - { min: 1, max: 2, severity: monitor, label: 輕度經濟壓力，建議追蹤與資源轉介 }
  - { min: 3, max: 4, severity: refer, label: 明顯經濟壓力影響照護，建議社工介入 }
clinicallyReviewed: false
