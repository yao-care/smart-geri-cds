# 工具性日常活動（IADL）短篩 — IADL self-report screen
# 來源：自述/家屬詢問之單題短篩（非標準命名量表），辨識工具性活動
# （購物、備餐、家務、理財、用藥、交通）是否需要他人協助。
# clinicallyReviewed: false → 題目、適用 CFS、切分點待臨床最終簽核。
#
# 角色（2026-05 起）：iadl 領域之 Tier-1 短篩（tier: screen）。亮燈後展開 Lawton 深評。
# IADL 可由家屬代評，故不設 requiresPatient（非認知/情緒測驗）。
id: iadl-screen
domain:
  top: functional
  sub: iadl
tier: screen
expandsTo: lawton-iadl
applicableCfs: [cfs3, cfs4, cfs5, cfs6, cfs7, cfs8, cfs9]
scoring: sum
inputType: option
maxScore: 2
items:
  - id: iadl_help
    mode: ask-patient
    prompt: 請向受測者或家屬詢問：工具性日常活動（購物、備餐、家務、理財、用藥、搭乘交通）是否需要他人協助？
    text: 工具性日常活動是否需要他人協助？
    options:
      - { label: 完全不需協助（皆可獨立）, score: 0 }
      - { label: 部分項目需協助, score: 1 }
      - { label: 多數或全部需協助, score: 2 }
bands:
  - { min: 0, max: 0, severity: normal, label: 工具性日常活動大致獨立 }
  - { min: 1, max: 1, severity: monitor, label: 部分工具性活動需協助，建議進一步評估 }
  - { min: 2, max: 2, severity: refer, label: 多數工具性活動需協助，建議轉介評估 }
clinicallyReviewed: false
