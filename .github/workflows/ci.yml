name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  index-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile

      - name: Reject bidirectional Unicode control chars (Trojan Source / CWE-94)
        run: |
          if grep -rlnP '[\x{202A}-\x{202E}\x{2066}-\x{2069}\x{200E}\x{200F}\x{061C}]' src public/data; then
            echo "::error::Bidirectional Unicode control characters found above (Trojan Source risk). Strip them — e.g. perl -CSD -i -pe 's/[\x{202A}-\x{202E}\x{2066}-\x{2069}\x{200E}\x{200F}\x{061C}]//g' <file>."
            exit 1
          fi
          echo "No bidirectional Unicode control characters found."

      - name: Regenerate generated indexes
        run: |
          pnpm exec tsx scripts/build-content-index.ts
          pnpm exec tsx scripts/build-questionnaire-applicability.ts
      - name: Fail if generated indexes drifted
        run: |
          if ! git diff --exit-code \
            public/data/video-index.json \
            src/lib/education/clinical-education.generated.ts \
            src/lib/data/expected-questionnaire-domains.generated.json; then
            echo "::error::Generated indexes out of sync. Run scripts/build-content-index.ts and scripts/build-questionnaire-applicability.ts, then commit."
            exit 1
          fi

      - run: pnpm test

  lighthouse:
    runs-on: ubuntu-latest
    needs: index-consistency
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          PUBLIC_CONTRIBUTION_WORKER_URL: ${{ vars.PUBLIC_CONTRIBUTION_WORKER_URL }}
      - run: npx @lhci/cli autorun
